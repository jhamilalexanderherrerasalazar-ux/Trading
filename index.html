<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal AI - Dashboard</title>
    <!-- Bootstrap para diseño y Chart.js para gráficos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .card-stats { background: #1e1e1e; border: none; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .italic { font-style: italic; }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-5">🚀 Mi Rendimiento de Trading</h2>

    <!-- Sección de Carga de Archivos -->
    <div class="row justify-content-center mb-5">
        <div class="col-md-8">
            <div class="card-stats text-center border border-primary">
                <h4 class="mb-3">📸 Escanear Nuevo Trade</h4>
                <p class="text-muted small">Sube la captura de tu MetaTrader o Broker</p>
                
                <input type="file" id="inputFoto" class="form-control bg-dark text-white mb-3" accept="image/*">
                
                <button onclick="subirYAnaizar()" id="btnAnalizar" class="btn btn-primary btn-lg w-100 fw-bold">
                    SUBIR Y ANALIZAR CON IA
                </button>
                
                <!-- Barra de progreso visual -->
                <div class="progress mt-3 d-none" id="barraProgreso">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 100%"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <!-- Tarjeta del Gráfico de Pastel -->
        <div class="col-md-6">
            <div class="card-stats shadow">
                <h5 class="text-center">Win Rate (Efectividad)</h5>
                <div class="chart-container">
                    <canvas id="graficoPastel"></canvas>
                </div>
            </div>
        </div>

        <!-- Tarjeta del Consejo de IA -->
        <div class="col-md-6">
            <div class="card-stats shadow">
                <h5 class="text-center text-info">🤖 Mentoría IA</h5>
                <hr style="border-color: #444;">
                <div id="consejoContenedor" class="py-3">
                    <p id="textoIA" class="lead text-center italic">"Analizando tus últimos trades..."</p>
                </div>
                <div class="text-center mt-3">
                    <span id="badgeEmocion" class="badge bg-primary">Estado: Disciplinado</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Función para subir y analizar la imagen
    async function subirYAnaizar() {
        const fileInput = document.getElementById('inputFoto');
        const btn = document.getElementById('btnAnalizar');
        const barra = document.getElementById('barraProgreso');
        // Asegúrate de que esta URL sea la de tu implementación actual de Google Apps Script
        const scriptURL = "https://script.google.com/macros/s/AKfycbxxc6xep2RfTq6-U7C4UNWNYVS3WzzzoN_m2akcN2fLeaPQVBVLjmiYMe4ua7vqAIF8/exec";

        if (fileInput.files.length === 0) {
            alert("Por favor, selecciona una captura de pantalla primero.");
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        btn.disabled = true;
        btn.innerText = "Subiendo imagen...";
        barra.classList.remove('d-none');

        reader.onload = function(e) {
            const base64Data = e.target.result.split(',')[1];
            const payload = {
                archivo: base64Data,
                tipo: file.type,
                nombre: "Trade_" + new Date().getTime() + ".png"
            };

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("✅ ¡Trade enviado! La IA lo procesará en breve.");
                btn.disabled = false;
                btn.innerText = "SUBIR Y ANALIZAR CON IA";
                barra.classList.add('d-none');
                fileInput.value = "";
            })
            .catch(error => {
                alert("❌ Error al subir: " + error);
                btn.disabled = false;
                barra.classList.add('d-none');
            });
        };

        reader.readAsDataURL(file);
    }

    // Inicialización de Gráficos al cargar la página
    document.addEventListener('DOMContentLoaded', function() {
        const tradesGanados = 15;
        const tradesPerdidos = 5;

        const ctx = document.getElementById('graficoPastel').getContext('2d');
        
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Ganados (Profit)', 'Perdidos (Loss)'],
                datasets: [{
                    data: [tradesGanados, tradesPerdidos],
                    backgroundColor: ['#2ecc71', '#e74c3c'],
                    borderColor: '#1e1e1e',
                    borderWidth: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#e0e0e0' }
                    }
                }
            }
        });

        actualizarConsejo(tradesGanados, tradesPerdidos);
    });

    function actualizarConsejo(g, p) {
        const total = g + p;
        const ratio = (g / total) * 100;
        let mensaje = "";

        if(ratio >= 70) {
            mensaje = "¡Excelente precisión! Estás operando con la mente fría. No subas el lotaje por euforia.";
        } else if (ratio >= 50) {
            mensaje = "Buen trabajo, eres rentable. Revisa si tus pérdidas son por no respetar el Stop Loss.";
        } else {
            mensaje = "Atención: Tu efectividad es baja. Detén el trading real y vuelve a demo hasta corregir el plan.";
        }

        document.getElementById('textoIA').innerText = `"${mensaje}"`;
    }
</script>

</body>
</html>
